name: Roll back production images

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full 40-character commit SHA of a previously deployed manifest
        required: true
        type: string

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate release identifier
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: test "${#RELEASE_SHA}" -eq 40 && test -z "${RELEASE_SHA//[0-9a-f]/}"
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Redeploy previous immutable manifest
        env:
          ARTIFACT_BUCKET: ${{ vars.SIGIL_ARTIFACT_BUCKET }}
          INSTANCE_ID: ${{ vars.SIGIL_INSTANCE_ID }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          SSM_DOCUMENT: ${{ vars.SIGIL_SSM_DEPLOY_DOCUMENT }}
        run: |
          aws s3api head-object --bucket "$ARTIFACT_BUCKET" --key "releases/${RELEASE_SHA}/sigil-images.env" >/dev/null
          parameters="$(jq -cn --arg sha "$RELEASE_SHA" '{ReleaseSha:[$sha]}')"
          command_id="$(aws ssm send-command \
            --document-name "$SSM_DOCUMENT" \
            --instance-ids "$INSTANCE_ID" \
            --parameters "$parameters" \
            --comment "Roll back Sigil Chat to ${RELEASE_SHA}" \
            --query 'Command.CommandId' \
            --output text)"
          for attempt in $(seq 1 60); do
            command_status="$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query Status \
              --output text)"
            case "$command_status" in
              Success) break ;;
              Pending|InProgress|Delayed) sleep 15 ;;
              *)
                aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID"
                exit 1
                ;;
            esac
            if [ "$attempt" -eq 60 ]; then
              echo "SSM rollback exceeded 15 minutes" >&2
              exit 1
            fi
          done
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent}'
