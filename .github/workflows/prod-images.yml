name: Build production images

on:
  workflow_dispatch:
  push:
    branches: [prod]

permissions:
  contents: read

concurrency:
  group: production-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.0.6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter '!sigil-chat-agent' -r --if-present test
      - run: pnpm --filter sigil-chat-agent exec vitest run
      - run: pnpm lint
      - run: node --test deploy/aws/*.test.mjs

  build:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [migrate, web, eve, gonk]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize registry path
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: echo "IMAGE_PREFIX=ghcr.io/${REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/sigil-chat-${{ matrix.target }}:${{ github.sha }}
      - name: Write immutable image reference
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          IMAGE_TARGET: ${{ matrix.target }}
        run: |
          mkdir -p image-digests
          key="SIGIL_$(printf '%s' "$IMAGE_TARGET" | tr '[:lower:]' '[:upper:]')_IMAGE"
          printf '%s=%s/sigil-chat-%s@%s\n' "$key" "$IMAGE_PREFIX" "$IMAGE_TARGET" "$IMAGE_DIGEST" > "image-digests/$IMAGE_TARGET.env"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-${{ matrix.target }}
          path: image-digests/${{ matrix.target }}.env
          if-no-files-found: error

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: image-digest-*
          path: image-digests
          merge-multiple: true
      - name: Assemble release manifest
        run: |
          LC_ALL=C sort image-digests/*.env > sigil-images.env
          test "$(wc -l < sigil-images.env)" -eq 4
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sigil-images-${{ github.sha }}
          path: sigil-images.env
          if-no-files-found: error
