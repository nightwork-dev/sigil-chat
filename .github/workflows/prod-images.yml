name: Build production images

on:
  workflow_dispatch:
  push:
    branches: [prod]

permissions:
  contents: read

concurrency:
  group: production-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.0.6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter '!sigil-chat-agent' -r --if-present test
      - run: pnpm --filter sigil-chat-agent exec vitest run
      - run: pnpm lint
      - run: node --test deploy/aws/*.test.mjs

  build:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target: [migrate, web, eve, gonk]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to private ECR
        env:
          ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
        run: aws ecr get-login-password | docker login --username AWS --password-stdin "$ECR_REGISTRY"
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ vars.ECR_REGISTRY }}/sigil-chat-${{ matrix.target }}:${{ github.sha }}-${{ github.run_attempt }}
          cache-from: type=registry,ref=${{ vars.ECR_REGISTRY }}/sigil-chat-build-cache:${{ matrix.target }}
          cache-to: type=registry,ref=${{ vars.ECR_REGISTRY }}/sigil-chat-build-cache:${{ matrix.target }},mode=max,image-manifest=true,oci-mediatypes=true
      - name: Write immutable image reference
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
          IMAGE_TARGET: ${{ matrix.target }}
        run: |
          mkdir -p image-digests
          key="SIGIL_$(printf '%s' "$IMAGE_TARGET" | tr '[:lower:]' '[:upper:]')_IMAGE"
          printf '%s=%s/sigil-chat-%s@%s\n' "$key" "$ECR_REGISTRY" "$IMAGE_TARGET" "$IMAGE_DIGEST" > "image-digests/$IMAGE_TARGET.env"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-${{ matrix.target }}
          path: image-digests/${{ matrix.target }}.env
          if-no-files-found: error

  manifest:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: image-digest-*
          path: image-digests
          merge-multiple: true
      - name: Assemble release manifest
        run: |
          LC_ALL=C sort image-digests/*.env > sigil-images.env
          test "$(wc -l < sigil-images.env)" -eq 4
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Publish immutable manifest and deploy through SSM
        env:
          ARTIFACT_BUCKET: ${{ vars.SIGIL_ARTIFACT_BUCKET }}
          INSTANCE_ID: ${{ vars.SIGIL_INSTANCE_ID }}
          SSM_DOCUMENT: ${{ vars.SIGIL_SSM_DEPLOY_DOCUMENT }}
        run: |
          manifest_uri="s3://${ARTIFACT_BUCKET}/releases/${GITHUB_SHA}/sigil-images.env"
          aws s3 cp sigil-images.env "$manifest_uri" --only-show-errors
          parameters="$(jq -cn --arg sha "$GITHUB_SHA" '{ReleaseSha:[$sha]}')"
          command_id="$(aws ssm send-command \
            --document-name "$SSM_DOCUMENT" \
            --instance-ids "$INSTANCE_ID" \
            --parameters "$parameters" \
            --comment "Deploy Sigil Chat ${GITHUB_SHA}" \
            --query 'Command.CommandId' \
            --output text)"
          for attempt in $(seq 1 60); do
            command_status="$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$INSTANCE_ID" \
              --query Status \
              --output text)"
            case "$command_status" in
              Success) break ;;
              Pending|InProgress|Delayed) sleep 15 ;;
              *)
                aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID"
                exit 1
                ;;
            esac
            if [ "$attempt" -eq 60 ]; then
              echo "SSM deployment exceeded 15 minutes" >&2
              exit 1
            fi
          done
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent}'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sigil-images-${{ github.sha }}
          path: sigil-images.env
          if-no-files-found: error
