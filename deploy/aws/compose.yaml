name: sigil-chat

x-service-hardening: &service-hardening
  restart: unless-stopped
  read_only: true
  init: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=64m
    - /home/sigil/.cache:size=64m
  logging:
    driver: local
    options:
      max-size: 10m
      max-file: "3"

services:
  migrate:
    image: ${SIGIL_MIGRATE_IMAGE:?set SIGIL_MIGRATE_IMAGE to an immutable digest}
    restart: "no"
    read_only: true
    init: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp:size=64m, /home/sigil/.cache:size=64m]
    environment:
      NODE_ENV: production
      SIGIL_DATABASE_URL: file:/var/lib/sigil-web/sigil-chat.db
      BETTER_AUTH_URL: https://${PUBLIC_HOST:?set PUBLIC_HOST}
      BETTER_AUTH_SECRET_FILE: /run/secrets/better_auth_secret
      SIGIL_INSTALLATION_ID: ${SIGIL_INSTALLATION_ID:?set a non-secret installation id}
      SIGIL_AUTH_REGISTRATION: closed
    secrets: [better_auth_secret]
    volumes: [web_data:/var/lib/sigil-web]
    networks: [backend]

  web:
    <<: *service-hardening
    image: ${SIGIL_WEB_IMAGE:?set SIGIL_WEB_IMAGE to an immutable digest}
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      BETTER_AUTH_URL: https://${PUBLIC_HOST:?set PUBLIC_HOST}
      BETTER_AUTH_SECRET_FILE: /run/secrets/better_auth_secret
      SIGIL_INSTALLATION_ID: ${SIGIL_INSTALLATION_ID:?set a non-secret installation id}
      SIGIL_AUTH_TRUSTED_ORIGINS: https://${PUBLIC_HOST:?set PUBLIC_HOST}
      SIGIL_AUTH_REGISTRATION: closed
      SIGIL_DATABASE_URL: file:/var/lib/sigil-web/sigil-chat.db
      GONK_MCP_KEY_FILE: /run/secrets/gonk_mcp_key
      EVE_ORIGIN: http://eve:3001
      GONK_MCP_URL: http://gonk:8808/mcp
      SIGIL_PERSONA_DIR: /var/lib/sigil-identity/personas
      SIGIL_MEMORY_DIR: /var/lib/sigil-identity/memory
      SIGIL_BLACKBOARD_DIR: /var/lib/sigil-blackboard
      SIGIL_INVITE_TOKEN_PEPPER_FILE: /run/secrets/invite_token_pepper
    secrets: [better_auth_secret, gonk_mcp_key, invite_token_pepper]
    volumes:
      - web_data:/var/lib/sigil-web
      - web_scope:/app/.agents
      - web_appdata:/app/.data
      - eve_identity:/var/lib/sigil-identity:ro
      - blackboard_data:/var/lib/sigil-blackboard
    expose: ["3000"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 4
    networks: [backend]

  eve:
    <<: *service-hardening
    image: ${SIGIL_EVE_IMAGE:?set SIGIL_EVE_IMAGE to an immutable digest}
    # The agent host writes runtime caches inside its own package tree
    # (extension authored-modules), which sits outside the data volumes.
    # Non-root, cap_drop ALL, and no-new-privileges still apply.
    read_only: false
    command:
      [
        "pnpm",
        "--filter",
        "sigil-chat-agent",
        "exec",
        "eve",
        "start",
        "--host",
        "0.0.0.0",
      ]
    tmpfs:
      - /tmp:size=64m
      - /home/sigil/.cache:size=64m
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      SIGIL_INSTALLATION_ID: ${SIGIL_INSTALLATION_ID:?set a non-secret installation id}
      SIGIL_EVE_AUTH_ISSUER: https://${PUBLIC_HOST:?set PUBLIC_HOST}
      SIGIL_EVE_AUTH_JWKS_URL: https://${PUBLIC_HOST:?set PUBLIC_HOST}/api/auth/jwks
      SIGIL_EVE_ALLOW_LOCAL_DEV_AUTH: "0"
      GONK_MCP_URL: http://gonk:8808/mcp
      GONK_MCP_KEY_FILE: /run/secrets/gonk_mcp_key
      CODEX_HOME: /var/lib/sigil-codex
      SIGIL_PERSONA_DIR: /var/lib/sigil-identity/personas
      SIGIL_MEMORY_DIR: /var/lib/sigil-identity/memory
      SIGIL_BLACKBOARD_DIR: /var/lib/sigil-blackboard
      SIGIL_SANDBOX_MODE: disabled
    secrets: [gonk_mcp_key]
    volumes:
      [
        eve_data:/var/lib/sigil-eve,
        eve_app:/app/apps/agent,
        eve_scope:/app/.agents,
        eve_identity:/var/lib/sigil-identity,
        codex_auth:/var/lib/sigil-codex,
        blackboard_data:/var/lib/sigil-blackboard,
      ]
    expose: ["3001"]
    healthcheck:
      # Container ordering needs process liveness, not model credentials. A fresh
      # deployment obtains Codex device auth only after edge/TLS is available.
      # Model-aware readiness remains authenticated at /sigil/v1/readiness and
      # is checked by the owner status surface plus the post-login runbook step.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/eve/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 4
    # edge too: eve needs egress for JWKS-over-HTTPS and model providers
    networks: [edge, backend]

  gonk:
    <<: *service-hardening
    image: ${SIGIL_GONK_IMAGE:?set SIGIL_GONK_IMAGE to an immutable digest}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8808"
      GONK_MCP_KEY_FILE: /run/secrets/gonk_mcp_key
      GONK_ALLOWED_HOSTS: gonk:8808
      SIGIL_CHAT_GRAPH_PATH: /var/lib/sigil-gonk/graph
      SIGIL_CHAT_REVIEW_PATH: /var/lib/sigil-gonk/review
      SIGIL_ARTIFACT_DIR: /var/lib/sigil-gonk/artifacts
      SIGIL_BLACKBOARD_DIR: /var/lib/sigil-blackboard
    secrets: [gonk_mcp_key]
    volumes:
      - gonk_data:/var/lib/sigil-gonk
      - gonk_scope:/app/.agents
      - blackboard_data:/var/lib/sigil-blackboard
    expose: ["8808"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('node:fs');const key=fs.readFileSync('/run/secrets/gonk_mcp_key','utf8').trim();fetch('http://127.0.0.1:8808/health',{headers:{authorization:'Bearer '+key}}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 4
    networks: [backend]

  edge:
    <<: *service-hardening
    image: caddy:2.10-alpine
    # caddy's binary ships file capabilities; exec fails EPERM under
    # no-new-privileges + cap_drop ALL. Edge keeps read_only+non-root instead.
    cap_drop: []
    security_opt: []
    user: "10004:10004"
    depends_on:
      web: { condition: service_healthy }
      eve: { condition: service_healthy }
      gonk: { condition: service_healthy }
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?set PUBLIC_HOST}
    ports: ["80:8080", "443:8443"]
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 4
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/sigil-chat/caddy-data:/data
      - /srv/sigil-chat/caddy-config:/config
    networks: [edge, backend]

networks:
  edge: {}
  backend:
    internal: true

volumes:
  web_data: {}
  web_scope: {}
  web_appdata: {}
  eve_data: {}
  eve_state: {}
  eve_app: {}
  gonk_scope: {}
  eve_scope: {}
  eve_identity: {}
  gonk_data: {}
  blackboard_data: {}
  codex_auth: {}

secrets:
  better_auth_secret:
    file: ${SIGIL_SECRET_DIR:?set SIGIL_SECRET_DIR}/better_auth_secret
  gonk_mcp_key:
    file: ${SIGIL_SECRET_DIR:?set SIGIL_SECRET_DIR}/gonk_mcp_key
  invite_token_pepper:
    file: ${SIGIL_SECRET_DIR:?set SIGIL_SECRET_DIR}/invite_token_pepper
