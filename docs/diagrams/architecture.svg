<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="360" viewBox="0 0 1060 360" role="img"
  aria-label="Sigil Chat two-service runtime: the browser talks to TanStack Start, TanStack authenticates users and calls Eve, Eve hosts Gonk application tools in-process, and both services use shared application repositories.">
  <rect width="1060" height="360" rx="24" fill="#0b1020"/>
  <style>
    .title { font: 700 17px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #dce8ff }
    .body { font: 12px system-ui, sans-serif; fill: #aabbd8 }
    .small { font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #7f95bb }
    .box { fill: #121a30; stroke: #344769; stroke-width: 1.5 }
    .accent { fill: #102b31; stroke: #48c7b7; stroke-width: 1.5 }
    .arrow { stroke: #7f95bb; stroke-width: 2; fill: none; marker-end: url(#arrow) }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#7f95bb"/>
    </marker>
  </defs>

  <rect class="box" x="35" y="68" width="210" height="118" rx="15"/>
  <text class="title" x="140" y="100" text-anchor="middle">Browser</text>
  <text class="body" x="140" y="127" text-anchor="middle">Chat · Studio · Review</text>
  <text class="body" x="140" y="148" text-anchor="middle">neutral agent contracts</text>
  <text class="small" x="140" y="171" text-anchor="middle">same-origin product UI</text>

  <rect class="box" x="320" y="48" width="300" height="158" rx="15"/>
  <text class="title" x="470" y="82" text-anchor="middle">apps/web · TanStack Start</text>
  <text class="body" x="470" y="112" text-anchor="middle">human auth · routes · uploads · artifacts</text>
  <text class="body" x="470" y="134" text-anchor="middle">web-owned repository operations</text>
  <text class="small" x="470" y="169" text-anchor="middle">sigil-chat.localhost</text>

  <rect class="accent" x="695" y="48" width="330" height="158" rx="15"/>
  <text class="title" x="860" y="82" text-anchor="middle">apps/agent · Eve host</text>
  <text class="body" x="860" y="112" text-anchor="middle">sessions · streaming · model · interruption</text>
  <text class="body" x="860" y="134" text-anchor="middle">Gonk registry hosted as native Eve tools</text>
  <text class="small" x="860" y="169" text-anchor="middle">sigil-chat-agent.localhost</text>

  <rect class="box" x="320" y="260" width="705" height="66" rx="15"/>
  <text class="title" x="672" y="288" text-anchor="middle">Shared application packages and stores</text>
  <text class="body" x="672" y="311" text-anchor="middle">agent-tools · artifact-store · work-items · graph · review · blackboard</text>

  <path class="arrow" d="M245 127 H310"/>
  <path class="arrow" d="M620 127 H685"/>
  <path class="arrow" d="M470 206 V250"/>
  <path class="arrow" d="M860 206 V250"/>

  <text class="small" x="652" y="104" text-anchor="middle">JWT + signed bindings</text>
  <text class="small" x="35" y="232">No third Gonk process · no internal MCP hop · no shared service bearer</text>
</svg>
