<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="380" viewBox="0 0 1060 380"
     font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" role="img"
     aria-label="Sigil Chat runtime topology: the browser renders chat, studio, and review workspaces plus an agent HUD, served over SSR and server functions by apps/web. apps/web hands sessions to apps/agent, the Eve host that owns durable sessions, streaming, and interruption through a local Codex login. apps/agent calls apps/gonk, the authenticated Gonk MCP server, over Streamable HTTP with a fresh turn-bound delegation signed by GONK_MCP_KEY. apps/web persists to a file-backed .data store; apps/agent persists Eve snapshots under .eve. Three trust boundaries: the tool-approval header is a client display preference, not a security control; GONK_MCP_KEY is an internal signing secret rather than end-user authority; and threads plus the active-session preference are deployment-global in local dev, with no per-user ownership.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/><stop offset="1" stop-color="#0c1322"/>
    </linearGradient>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5a6f96"/>
    </marker>
    <marker id="arc" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto">
      <path d="M0,0 L8,3.2 L0,6.4 Z" fill="#2bd4ff"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1060" height="380" rx="14" fill="url(#bg)"/>

  <text x="530" y="28" text-anchor="middle" font-size="13" fill="#6f84a8">Three services, each with a narrow, non-overlapping job.</text>

  <!-- main row: 4 cards w=160 h=120 y=70 ; x = 30, 310, 590, 870 -->
  <g>
    <rect x="30" y="70" width="160" height="120" rx="13" fill="#0e1626" stroke="#243250" stroke-width="1.5"/>
    <rect x="30" y="70" width="160" height="4" rx="2" fill="#2bd4ff"/>
    <text x="110" y="98" text-anchor="middle" font-size="18" font-weight="700" fill="#eaf1ff">Browser</text>
    <text x="110" y="122" text-anchor="middle" font-size="11" fill="#8aa0c4">workspaces + agent HUD</text>
  </g>

  <g>
    <rect x="310" y="70" width="160" height="120" rx="13" fill="#0e1626" stroke="#243250" stroke-width="1.5"/>
    <rect x="310" y="70" width="160" height="4" rx="2" fill="#2bd4ff"/>
    <text x="390" y="98" text-anchor="middle" font-family="SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#9ce8ff">apps/web</text>
    <text x="390" y="122" text-anchor="middle" font-size="11" fill="#8aa0c4">TanStack Start · SSR</text>
    <text x="390" y="175" text-anchor="middle" font-family="SFMono-Regular, Menlo, monospace" font-size="9" fill="#6f84a8">sigil-chat.localhost</text>
  </g>

  <g>
    <rect x="590" y="70" width="160" height="120" rx="13" fill="#0e1626" stroke="#3a2415" stroke-width="1.5"/>
    <rect x="590" y="70" width="160" height="4" rx="2" fill="#ff7a18"/>
    <text x="670" y="98" text-anchor="middle" font-family="SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#ffd9b8">apps/agent</text>
    <text x="670" y="122" text-anchor="middle" font-size="11" fill="#caa183">Eve host · local Codex</text>
    <text x="670" y="175" text-anchor="middle" font-family="SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#6f84a8">sigil-chat-agent.localhost</text>
  </g>

  <g>
    <rect x="870" y="70" width="160" height="120" rx="13" fill="#0e1626" stroke="#243250" stroke-width="1.5"/>
    <rect x="870" y="70" width="160" height="4" rx="2" fill="#2bd4ff"/>
    <text x="950" y="98" text-anchor="middle" font-family="SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" fill="#9ce8ff">apps/gonk</text>
    <text x="950" y="122" text-anchor="middle" font-size="11" fill="#8aa0c4">Gonk MCP registry</text>
    <text x="950" y="175" text-anchor="middle" font-family="SFMono-Regular, Menlo, monospace" font-size="8" fill="#6f84a8">sigil-chat-gonk.localhost/mcp</text>
  </g>

  <!-- relationship chips between cards, w=100 h=64 y=98, centered in each 120px gap -->
  <line x1="190" y1="130" x2="200" y2="130" stroke="#5a6f96" stroke-width="2"/>
  <g>
    <rect x="200" y="98" width="100" height="64" rx="12" fill="#0c1424" stroke="#2b3753" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="250" y="124" text-anchor="middle" font-size="11.5" font-weight="700" fill="#cdd9ee">SSR +</text>
    <text x="250" y="142" text-anchor="middle" font-size="11.5" font-weight="700" fill="#cdd9ee">server fns</text>
  </g>
  <line x1="300" y1="130" x2="310" y2="130" stroke="#5a6f96" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="310" y1="150" x2="300" y2="150" stroke="#5a6f96" stroke-width="2" marker-end="url(#ar)"/>

  <line x1="470" y1="130" x2="480" y2="130" stroke="#5a6f96" stroke-width="2" marker-end="url(#ar)"/>
  <g>
    <rect x="480" y="98" width="100" height="64" rx="12" fill="#0c1424" stroke="#2b3753" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="530" y="124" text-anchor="middle" font-size="11.5" font-weight="700" fill="#cdd9ee">session +</text>
    <text x="530" y="142" text-anchor="middle" font-size="11.5" font-weight="700" fill="#cdd9ee">stream</text>
  </g>
  <line x1="580" y1="130" x2="590" y2="130" stroke="#5a6f96" stroke-width="2" marker-end="url(#ar)"/>

  <line x1="750" y1="130" x2="760" y2="130" stroke="#2bd4ff" stroke-width="2" marker-end="url(#arc)"/>
  <g>
    <rect x="760" y="98" width="100" height="64" rx="12" fill="#102a3a" stroke="#2bd4ff" stroke-width="1.5"/>
    <text x="810" y="124" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9ce8ff">turn-bound</text>
    <text x="810" y="142" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9ce8ff">delegation</text>
  </g>
  <line x1="860" y1="130" x2="870" y2="130" stroke="#2bd4ff" stroke-width="2" marker-end="url(#arc)"/>

  <!-- file-backed stores under apps/web and apps/agent -->
  <line x1="390" y1="190" x2="390" y2="212" stroke="#3a4a6a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <g>
    <rect x="320" y="212" width="140" height="38" rx="9" fill="#0c1424" stroke="#2b3753" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="390" y="235" text-anchor="middle" font-size="11" fill="#8aa0c4">.data (file-backed)</text>
  </g>

  <line x1="670" y1="190" x2="670" y2="212" stroke="#3a4a6a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <g>
    <rect x="600" y="212" width="140" height="38" rx="9" fill="#0c1424" stroke="#2b3753" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="670" y="235" text-anchor="middle" font-size="11" fill="#8aa0c4">.eve snapshots</text>
  </g>

  <!-- trust boundaries -->
  <text x="30" y="286" font-size="11" font-weight="600" letter-spacing="1.5" fill="#6f84a8">TRUST BOUNDARIES</text>
  <text x="30" y="308" font-size="12" fill="#8aa0c4">tool-approval header — client display preference, not a security control</text>
  <text x="30" y="330" font-size="12" fill="#8aa0c4">GONK_MCP_KEY signs internal delegation — it is not an end-user credential or route authority</text>
  <text x="30" y="352" font-size="12" fill="#8aa0c4">threads and the active-session preference are deployment-global in local dev — no per-user ownership yet</text>
</svg>
